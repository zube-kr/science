<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뇌 구조 탐구 — 클릭해서 알아보기</title>
<style>
  :root{
    --bg: #F5F3EE;
    --ink: #232A35;
    --ink-soft: #626A78;
    --line: #DCD6C7;
    --card: #FFFFFF;

    --c-cerebrum: #5A76AC;      --c-cerebrum-l: #8CA2CB; --c-cerebrum-d: #445D8C; --c-cerebrum-soft: #E9EDF6;
    --c-diencephalon: #93679E;  --c-diencephalon-l: #B78DBF; --c-diencephalon-d: #714D7C; --c-diencephalon-soft: #F1E8F2;
    --c-midbrain: #CE9A44;      --c-midbrain-l: #E2BA75; --c-midbrain-d: #A8792C; --c-midbrain-soft: #F8EFDC;
    --c-cerebellum: #BE6B5F;    --c-cerebellum-l: #D68F81; --c-cerebellum-d: #9B5147; --c-cerebellum-soft: #F5E4E1;
    --c-medulla: #C67B9C;       --c-medulla-l: #DA9FB9; --c-medulla-d: #A15C79; --c-medulla-soft: #F6E5EE;
    --c-spinal: #A88958;        --c-spinal-l: #C2A67B; --c-spinal-d: #83683F; --c-spinal-soft: #F0E7D6;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #FBFAF6 0%, var(--bg) 55%),
      var(--bg);
    color: var(--ink);
    font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .wrap{ max-width: 1200px; margin: 0 auto; }

  header{ margin-bottom: 36px; display:flex; flex-direction:column; gap: 10px; }

  .eyebrow{
    font-size: 12.5px; letter-spacing: 0.14em; color: var(--ink-soft);
    font-weight: 700; text-transform: uppercase;
  }

  h1{
    font-size: clamp(26px, 3.6vw, 38px); font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.28;
  }
  h1 span{ color: var(--c-cerebrum); }

  .sub{ color: var(--ink-soft); font-size: 15px; line-height: 1.65; max-width: 580px; }

  main{
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.85fr);
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 900px){ main{ grid-template-columns: 1fr; } }

  .stage{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px 18px 16px;
    position: relative;
    box-shadow: 0 1px 3px rgba(35,42,53,0.05);
  }

  .stage-label{ display:flex; justify-content: space-between; align-items:center; margin-bottom: 6px; padding: 0 4px;}
  .stage-label .hint{ font-size: 12.5px; color: var(--ink-soft); }

  .legend{
    display:flex; flex-wrap: wrap; gap: 7px 10px;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--line);
  }

  .legend button{
    display:flex; align-items:center; gap: 7px;
    background: none; border: none; font-family: inherit;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; padding: 5px 10px 5px 6px; border-radius: 999px;
    transition: background .15s ease, color .15s ease;
  }
  .legend button:hover{ background: #F1EEE5; color: var(--ink); }
  .legend button.active{ background: var(--dot-soft, #eee); color: var(--ink); }
  .legend .dot{ width: 9px; height: 9px; border-radius: 50%; background: var(--dot, #999); flex-shrink: 0; }

  svg{ width: 100%; height: auto; display:block; }

  .region{ cursor: pointer; transition: filter .15s ease, opacity .2s ease; }
  .region:hover .surface{ filter: brightness(1.05); }
  .region.dim{ opacity: 0.25; }

  .badge circle{ transition: r .2s ease; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25)); }
  .region.selected .badge circle{ r: 14.5; }
  .badge text{ font-weight: 800; font-size: 12.5px; fill: #fff; pointer-events:none; }
  .badge{ pointer-events:none; }

  .panel{
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 26px 24px; min-height: 320px; position: sticky; top: 28px;
  }
  .panel .empty{ color: var(--ink-soft); font-size: 14.5px; line-height: 1.75; padding-top: 6px; }
  .panel .empty b{ color: var(--ink); }

  .tag{
    display:inline-flex; align-items:center; gap: 8px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.02em; padding: 5px 12px 5px 8px; border-radius: 999px; margin-bottom: 14px;
  }
  .tag .num{
    width: 20px; height: 20px; border-radius: 50%; display:flex; align-items:center; justify-content:center;
    color: #fff; font-size: 11.5px; font-weight: 800; background: var(--dot);
  }

  .panel h2{ font-size: 23px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 4px; }
  .panel .en{ font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-bottom: 16px; }
  .panel p.desc{ font-size: 14.5px; line-height: 1.75; color: #333A45; margin-bottom: 18px; }

  .panel .func-list{ list-style: none; display:flex; flex-direction:column; gap: 9px; }
  .panel .func-list li{ font-size: 13.5px; line-height: 1.55; color: var(--ink); padding-left: 18px; position: relative; }
  .panel .func-list li::before{
    content: ""; position:absolute; left: 0; top: 7px; width: 6px; height: 6px; border-radius: 50%; background: var(--dot);
  }

  .panel .nav{ display:flex; justify-content: space-between; margin-top: 22px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .panel .nav button{
    font-family: inherit; font-size: 12.5px; font-weight: 700; color: var(--ink-soft);
    background: #F1EEE5; border: none; border-radius: 10px; padding: 9px 14px; cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .panel .nav button:hover{ background: #E7E3D6; color: var(--ink); }

  footer{ max-width: 1200px; margin: 32px auto 0; color: var(--ink-soft); font-size: 12px; text-align: center; }

  @media (prefers-reduced-motion: reduce){ .region, .badge circle{ transition: none; } }
</style>
</head>

<script>
  const data = {
    cerebrum: {
      num: 1, ko: "대뇌", en: "Cerebrum", color: "var(--c-cerebrum)", soft: "var(--c-cerebrum-soft)",
      desc: "뇌에서 가장 큰 부분을 차지하며, 좌우 반구로 나뉘어 인간의 고차원적인 정신 활동을 담당합니다.",
      funcs: ["생각과 판단 등 고등 인지 기능 수행", "기억의 저장과 회상", "언어의 이해와 표현", "시각·청각 등 감각 정보 처리", "수의적인 운동의 계획과 조절"]
    },
    diencephalon: {
      num: 2, ko: "간뇌", en: "Diencephalon", color: "var(--c-diencephalon)", soft: "var(--c-diencephalon-soft)",
      desc: "대뇌와 중뇌 사이에 위치하며, 시상과 시상하부 등을 포함하는 부위입니다.",
      funcs: ["감각 정보를 대뇌로 중계 전달", "체온·식욕·수면 등 항상성 유지", "자율신경계와 내분비계 조절의 중추 역할"]
    },
    midbrain: {
      num: 3, ko: "중뇌", en: "Midbrain", color: "var(--c-midbrain)", soft: "var(--c-midbrain-soft)",
      desc: "간뇌와 뇌교(교뇌) 사이에 위치한 작은 부위로, 뇌줄기의 일부를 이룹니다.",
      funcs: ["시각·청각 반사 조절", "안구 운동과 동공 반사 조절", "몸의 자세와 근육 긴장도 조절", "각성 상태 유지에 관여"]
    },
    cerebellum: {
      num: 4, ko: "소뇌", en: "Cerebellum", color: "var(--c-cerebellum)", soft: "var(--c-cerebellum-soft)",
      desc: "대뇌 뒤쪽 아래에 위치하며, 나뭇가지 모양의 치밀한 주름 구조(arbor vitae)가 특징입니다.",
      funcs: ["몸의 균형과 평형 유지", "자세 조절", "정교한 운동의 학습과 협응", "운동 명령을 미세하게 조정"]
    },
    medulla: {
      num: 5, ko: "연수", en: "Medulla Oblongata", color: "var(--c-medulla)", soft: "var(--c-medulla-soft)",
      desc: "뇌줄기의 가장 아래 부분으로, 척수와 바로 연결되는 생명 유지의 핵심 부위입니다.",
      funcs: ["호흡 운동 조절", "심장 박동 조절", "소화 기능 조절", "재채기·기침 등 반사 중추 역할"]
    },
    spinal: {
      num: 6, ko: "척수", en: "Spinal Cord", color: "var(--c-spinal)", soft: "var(--c-spinal-soft)",
      desc: "연수에서 이어져 척추 안을 따라 내려가는 긴 신경 다발로, 뇌와 온몸을 연결합니다.",
      funcs: ["감각 정보를 뇌로 전달하는 경로", "뇌의 운동 명령을 몸으로 전달", "무릎 반사 등 반사 작용 수행"]
    }
  };

  const order = ["cerebrum", "diencephalon", "midbrain", "cerebellum", "medulla", "spinal"];

  const legend = document.getElementById("legend");
  order.forEach(key => {
    const d = data[key];
    const btn = document.createElement("button");
    btn.dataset.key = key;
    btn.style.setProperty("--dot", d.color);
    btn.style.setProperty("--dot-soft", d.soft);
    btn.innerHTML = `<span class="dot"></span>${d.ko}`;
    btn.addEventListener("click", () => select(key));
    legend.appendChild(btn);
  });

  const regions = document.querySelectorAll(".region");
  const panel = document.getElementById("panel");

  function renderPanel(key){
    const d = data[key];
    panel.innerHTML = `
      <div class="tag" style="background:${d.soft}">
        <span class="num" style="background:${d.color}">${d.num}</span>
        <span style="color:${d.color}">뇌 구조 ${d.num}</span>
      </div>
      <h2>${d.ko}</h2>
      <div class="en">${d.en}</div>
      <p class="desc">${d.desc}</p>
      <ul class="func-list" style="--dot:${d.color}">
        ${d.funcs.map(f => `<li style="--dot:${d.color}">${f}</li>`).join("")}
      </ul>
      <div class="nav">
        <button id="prevBtn">← 이전 부위</button>
        <button id="nextBtn">다음 부위 →</button>
      </div>
    `;
    document.getElementById("prevBtn").addEventListener("click", () => {
      const i = order.indexOf(key);
      select(order[(i - 1 + order.length) % order.length]);
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      const i = order.indexOf(key);
      select(order[(i + 1) % order.length]);
    });
  }

  function select(key){
    regions.forEach(r => {
      const isMatch = r.dataset.key === key;
      r.classList.toggle("selected", isMatch);
      r.classList.toggle("dim", !isMatch);
    });
    document.querySelectorAll(".legend button").forEach(b => {
      b.classList.toggle("active", b.dataset.key === key);
    });
    renderPanel(key);
  }

  regions.forEach(r => {
    r.addEventListener("click", () => select(r.dataset.key));
    r.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        select(r.dataset.key);
      }
    });
  });
</script>
